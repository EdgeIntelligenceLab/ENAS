# NanoNAS — Baseline experiment configuration
# Used to reproduce the reference results in Tables 1 and 2 of the paper.

method: NanoNAS

search:
  strategy:        greedy_coordinate_ascent
  proxy_epochs:    3
  evaluation_mode: tflite_stm32tflm    # full hardware-in-the-loop (slow)

training:
  epochs:        100
  learning_rate: 0.01
  batch_size:    128

quantization:
  num_representative_samples: 150

seeds: [11, 42, 137]
