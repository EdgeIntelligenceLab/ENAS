# Ablation experiments — varying single hyperparameters to isolate their effect.
# Used to generate Table 2 (ablation study) in the paper.

base_config: enas_v2_1_default

ablations:
  # ── Proxy epochs sweep ────────────────────────────────────────────────
  - name: ablate_proxy_epochs_1
    override:
      search.proxy_epochs: 1

  - name: ablate_proxy_epochs_2
    override:
      search.proxy_epochs: 2

  - name: ablate_proxy_epochs_5
    override:
      search.proxy_epochs: 5

  # ── Proxy data sweep ──────────────────────────────────────────────────
  - name: ablate_data_10pct
    override:
      search.proxy_data_fraction: 0.10

  - name: ablate_data_20pct
    override:
      search.proxy_data_fraction: 0.20

  - name: ablate_data_50pct
    override:
      search.proxy_data_fraction: 0.50

  # ── Scoring weights ───────────────────────────────────────────────────
  - name: ablate_eff_weight_low
    override:
      scoring.accuracy_weight:   0.90
      scoring.efficiency_weight: 0.05
      scoring.headroom_weight:   0.05

  - name: ablate_eff_weight_high
    override:
      scoring.accuracy_weight:   0.65
      scoring.efficiency_weight: 0.25
      scoring.headroom_weight:   0.10

  # ── Search strategy ───────────────────────────────────────────────────
  - name: ablate_no_mutation
    override:
      search.n_mutations_per_arch: 0   # disables Stage 3

  - name: ablate_no_seeding
    override:
      search.use_nanonas_seed: false
