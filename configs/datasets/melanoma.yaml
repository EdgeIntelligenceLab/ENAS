# Melanoma Detection dataset configuration
name: melanoma

paths:
  train: dataset/melanoma_cancer_dataset/train
  val:   datasets/melanoma/val
  test:  dataset/melanoma_cancer_dataset/test

num_classes: 2
class_names: [benign, malignant]

preprocessing:
  resize_modes: [bilinear]
  color_mode:   rgb
  val_split:    0.15
  test_size_per_class: 500

source:
  base_dataset: ISIC_archive
  url:          https://www.isic-archive.com/
  note:         Requires registration to download; see datasets/README.md
