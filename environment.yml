name: enas-tinyml
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.9
  - pip>=23.0

  # ── Core ML stack ─────────────────────────────────────────────────────
  - numpy>=1.23,<2.0
  - scipy>=1.10
  - pandas>=2.0
  - scikit-learn>=1.3

  # ── Image processing ──────────────────────────────────────────────────
  - pillow>=9.5
  - opencv

  # ── Visualisation ─────────────────────────────────────────────────────
  - matplotlib>=3.7
  - seaborn>=0.12

  # ── Config / utilities ────────────────────────────────────────────────
  - pyyaml>=6.0
  - tqdm>=4.65

  # ── Notebooks ─────────────────────────────────────────────────────────
  - jupyter>=1.0
  - ipykernel>=6.25

  # ── Dev tools ─────────────────────────────────────────────────────────
  - pytest>=7.4
  - black>=23.7
  - flake8>=6.1

  # ── Pip-only packages ─────────────────────────────────────────────────
  - pip:
      - tensorflow==2.13.0
      - tensorflow-model-optimization>=0.7.5
      - omegaconf>=2.3
      - pycocotools>=2.0.6
      - plotly>=5.15
